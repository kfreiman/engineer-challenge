version: v25.4.0
dsn: "${DSN}"

# yaml-language-server: $schema=https://raw.githubusercontent.com/ory/kratos/v25.4.0/.schemastore/config.schema.json
serve:
  public:
    cors:
      enabled: true
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: "${SELFSERVICE_DEFAULT_BROWSER_RETURN_URL}" # must be set by schema, value getting from env setup

  methods:
    password:
      enabled: true
    code: # Enables the "one-time code" method. Use 'link' to enable "magic link" method.
      enabled: true
      config:
        lifespan: 15m # Defines how long the code or link are valid for. Default: 1h.

  flows:
    error: {}
    logout: {}

    login:
      lifespan: 24h
      # after:
      #   hooks:
      #     - hook: web_hook
      #       config:
      #         method: "POST"
      #         body: base64://ZnVuY3Rpb24oY3R4KSB7IGlkZW50aXR5X2lkOiBjdHguaWRlbnRpdHkuaWQgfQo=
      #         url: http://msg_server/backend/v1/workspace/create-default
              # response:
              #   ignore: false # Defines if the webhook response should be ignored and run async. Boolean. OPTIONAL
              #   parse: false

    registration:
      lifespan: 1h
      after:
        password:
          hooks:
          - hook: web_hook
            config:
              method: "POST"
              # function(ctx) { identity_id: ctx.identity.id, email: ctx.identity.traits.email }
              body: base64://ZnVuY3Rpb24oY3R4KSB7IGlkZW50aXR5X2lkOiBjdHguaWRlbnRpdHkuaWQsIGVtYWlsOiBjdHguaWRlbnRpdHkudHJhaXRzLmVtYWlsIH0=
              url: http://orbitto_core:8080/profile/v1/webhook/kratos # TODO make configurable?
              response:
                ignore: false # Defines if the webhook response should be ignored and run async. Boolean. OPTIONAL
                parse: false
          - hook: session
    settings:
      privileged_session_max_age: 1h
    
    recovery: 
      enabled: true
      lifespan: 15m # Defines how much time the user has to complete the recovery flow in the UI. Default: 1h.
      use: code # Defines which method is used, one of 'code' or 'link'.
    
    verification:
      enabled: false

session:
  whoami:
    required_aal: highest_available

log:
  level: info
  format: json
  leak_sensitive_values: false

secrets:
  # ignore, comes from env
  # yaml-language-server-disable 
  cookie: []
  # ignore, comes from env
  # yaml-language-server-disable 
  cipher: []

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 8

identity:
  default_schema_id: user
  schemas:
    - id: user
      url: file:///etc/config/kratos/user.schema.json
