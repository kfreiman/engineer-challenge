# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3-file-provider.json

http:
  routers:
    billing:
      rule: "PathPrefix(`/api/billing`)"
      entryPoints:
        - web
      service: billing
  services:
    billing:
      loadBalancer:
        servers:
          - url: "http://billing:8082"
