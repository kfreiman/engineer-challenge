# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3-file-provider.json
http:
  routers:
    kratos:
      rule: "PathPrefix(`/self-service/`) || PathPrefix(`/sessions`) || PathPrefix(`/schemas`)"
      priority: 2
      entryPoints:
        - web
      service: kratos_svc
  services:
    kratos_svc:
      loadBalancer:
        servers:
          - url: "http://orbitto_kratos:4433"
