# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3-file-provider.json
http:
  routers:
    bff:
      rule: PathPrefix(`/bff`)
      service: bff
      entryPoints:
        - web
      priority: 2
      middlewares:
        - strip-prefix
        - kratos-auth
  services:
    bff:
      loadBalancer:
        servers:
          - url: http://orbitto_core:8081
  middlewares:
    strip-prefix:
      stripPrefix:
        prefixes:
          - /bff
    kratos-auth:
      forwardAuth:
        address: http://orbitto_kratos:4433/sessions/whoami
        trustForwardHeader: true
        authResponseHeaders:
          - x-kratos-authenticated-identity-id
