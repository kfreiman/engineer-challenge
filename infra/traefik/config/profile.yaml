# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3-file-provider.json
http:
  routers:
    profile:
      rule: "PathPrefix(`/api/profile`)"
      entryPoints:
        - web
      service: profile
  services:
    profile:
      loadBalancer:
        servers:
          - url: "http://profile:8081"
